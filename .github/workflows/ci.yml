name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # =========================================================
  # JOB 1 : TESTS + COUVERTURE DE CODE (minimum 60 %)
  # =========================================================
  tests:
    name: Tests PHPUnit + Couverture
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.4 (+ PCOV pour la couverture)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, sqlite3, pdo_sqlite, bcmath, gd, exif
          coverage: pcov

      - name: Cache des dependances Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      - name: Installation des dependances
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Preparation de l'environnement de test
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Execution des tests avec couverture
        working-directory: backend
        run: php artisan test --coverage --min=60 --coverage-clover=coverage.clover

      - name: Archivage du rapport de couverture
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rapport-couverture
          path: backend/coverage.clover
          retention-days: 30

  # =========================================================
  # JOB 2 : ANALYSE DE SECURITE DES DEPENDANCES
  # =========================================================
  security:
    name: Audit de securite (dependances)
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Installation des dependances backend
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Audit des dependances PHP (Composer)
        working-directory: backend
        run: composer audit

      - name: Installation de Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit des dependances JS (npm)
        working-directory: frontend
        run: npm audit --audit-level=high

  # =========================================================
  # JOB 3 : SCAN DES IMAGES DOCKER (Trivy)
  # Detecte les CVE dans les images de base (php, nginx, node...).
  # Bloque le pipeline uniquement sur les failles CRITICAL.
  # =========================================================
  docker-scan:
    name: Scan des images Docker (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      # --- BACKEND ---
      - name: Construction de l'image backend
        run: docker build -t baobab-backend:scan --target production ./backend

      - name: Scan Trivy de l'image backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'baobab-backend:scan'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      # --- FRONTEND ---
      - name: Construction de l'image frontend
        run: docker build -t baobab-frontend:scan --target production ./frontend

      - name: Scan Trivy de l'image frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'baobab-frontend:scan'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      # --- Rapport complet (informatif, non bloquant) ---
      - name: Rapport complet des vulnerabilites (backend)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'baobab-backend:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'